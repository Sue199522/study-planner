<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sue学习打卡">
<meta name="theme-color" content="#FF6B9D">
<link rel="manifest" href="./manifest.json">
<title>Sue · 学习打卡</title>
<style>
:root{--pri:#FF6B9D;--pri-l:#FFA8C5;--pri-d:#E85587;--suc:#00D2A0;--wrn:#FFD93D;--dng:#FF6B6B;--bg:#1A0A12;--card:#2A1520;--card2:#351E2C;--text:#F5E6EE;--muted:#AA8899;--border:#3D2535;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));-webkit-tap-highlight-color:transparent}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;transition:color .2s}
.tab-btn .tab-icon{font-size:22px;margin-bottom:2px}
.tab-btn.active{color:var(--pri)}

/* Pages */
.page{display:none;padding:0 16px 20px}.page.active{display:block}

/* Header */
.hdr{background:linear-gradient(135deg,#FF6B9D,#FFA8C5);padding:20px 16px 24px;margin:-0 0 0;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(255,107,157,.3)}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:20px;font-weight:700}
.hdr .date-line{font-size:12px;opacity:.9;margin-top:4px}
.hdr .lunar-line{font-size:11px;opacity:.75;margin-top:2px}
.hdr-right{text-align:right;font-size:12px;opacity:.9}
.hdr-right .weather-icon{font-size:28px}
.hdr-right .weather-temp{font-size:16px;font-weight:700}
.hdr-right .weather-desc{font-size:11px;opacity:.85}
.progress-bar{background:rgba(255,255,255,.15);border-radius:20px;height:6px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;background:#FFEAA7;border-radius:20px;transition:width .5s}
.progress-text{display:flex;justify-content:space-between;font-size:11px;margin-top:4px;opacity:.85}

/* Settings btn */
.settings-btn{background:none;border:none;color:white;font-size:20px;cursor:pointer;opacity:.8;padding:4px}
.settings-btn:hover{opacity:1}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 16px 0;margin-top:-8px}
.stat{background:var(--card);border-radius:12px;padding:10px 6px;text-align:center}
.stat b{font-size:20px;font-weight:800;display:block}
.stat b.p1{color:var(--pri-l)}.stat b.p2{color:var(--suc)}.stat b.p3{color:var(--wrn)}.stat b.p4{color:var(--dng)}
.stat small{font-size:10px;color:var(--muted)}

/* Section */
.sec{margin-top:20px}
.sec-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-title .badge{background:var(--pri);color:white;font-size:10px;padding:2px 10px;border-radius:20px;font-weight:500}

/* Countdown */
.countdown-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.cd-card{background:var(--card);border-radius:12px;padding:12px;text-align:center}
.cd-card .cd-num{font-size:24px;font-weight:800;color:var(--pri-l)}
.cd-card .cd-label{font-size:11px;color:var(--muted);margin-top:2px}
.cd-card .cd-date{font-size:10px;color:var(--muted);opacity:.7}

/* Task */
.task-list{display:flex;flex-direction:column;gap:8px}
.tcard{background:var(--card);border-radius:var(--radius);padding:12px 14px;border-left:4px solid var(--pri);position:relative;transition:opacity .2s}
.tcard.done{opacity:.6}.tcard.done .tname{text-decoration:line-through}
.tcard.now{border-left-color:var(--wrn);box-shadow:0 0 12px rgba(255,217,61,.12)}
.tcard.now::after{content:'⏰ 进行中';position:absolute;top:-7px;right:10px;background:var(--wrn);color:#333;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
.tcard.late{border-left-color:var(--dng)}
.ttop{display:flex;align-items:center;justify-content:space-between}
.ttime{font-size:12px;color:var(--pri-l);font-weight:600;background:rgba(255,107,157,.12);padding:2px 8px;border-radius:6px}
.tacts{display:flex;gap:6px}
.tbtn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px;border-radius:6px}
.tbtn:hover{background:rgba(255,255,255,.08)}
.tbtn.ck{font-size:18px}
.tname{font-size:14px;font-weight:600;margin-top:4px}
.tnote{font-size:11px;color:var(--muted);margin-top:3px}

.add-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:12px;margin-top:10px;background:rgba(255,107,157,.1);border:2px dashed var(--pri);border-radius:var(--radius);color:var(--pri-l);font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:rgba(255,107,157,.18)}
.templates{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tchip{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:5px 12px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .2s}
.tchip:hover{border-color:var(--pri);color:var(--pri-l)}

/* Water */
.water-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.water-cup{font-size:28px;cursor:pointer;transition:transform .15s;opacity:.4}
.water-cup.filled{opacity:1;transform:scale(1.05)}
.water-cup:hover{transform:scale(1.15)}
.water-info{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}

/* Journal */
.jcard{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.jcard:focus-within{border-color:var(--pri)}
.jprompt{font-size:12px;color:var(--pri-l);margin-bottom:8px;font-style:italic}
.jta{width:100%;min-height:80px;background:transparent;border:none;color:var(--text);font-size:13px;line-height:1.7;resize:vertical;outline:none;font-family:inherit}
.jta::placeholder{color:var(--muted)}
.jfoot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.jsaved{font-size:10px;color:var(--muted)}
.moods{display:flex;gap:6px}
.mbtn{font-size:22px;background:none;border:none;cursor:pointer;padding:2px;border-radius:6px;opacity:.45;transition:all .2s}
.mbtn:hover{opacity:.7}
.mbtn.sel{opacity:1;background:rgba(255,107,157,.2);transform:scale(1.15)}
.jhist-toggle{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:6px}
.jhist-toggle:hover{color:var(--pri-l)}
.jentry{background:var(--card);border-radius:8px;padding:10px;margin-top:8px;border-left:3px solid var(--pri)}
.jentry-date{font-size:11px;color:var(--pri-l);font-weight:600}
.jentry-text{font-size:12px;margin-top:4px;white-space:pre-wrap;line-height:1.5}

/* Calendar Tab */
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 8px}
.cal-header h2{font-size:18px;font-weight:700}
.cal-nav{background:none;border:none;color:var(--pri-l);font-size:20px;cursor:pointer;padding:4px 10px;border-radius:8px}
.cal-nav:hover{background:var(--card)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;position:relative;font-size:14px;font-weight:600}
.cal-day:hover{background:var(--card2)}
.cal-day.today{background:rgba(255,107,157,.2);border:2px solid var(--pri)}
.cal-day.other-month{opacity:.3}
.cal-day .lunar{font-size:8px;color:var(--muted);font-weight:400;margin-top:1px}
.cal-day .lunar.fest{color:var(--pri-l);font-weight:600}
.cal-day .lunar.term{color:var(--wrn);font-weight:600}
.cal-day .chk-dot{position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--suc)}
.heatmap-title{font-size:13px;color:var(--muted);margin-top:16px;margin-bottom:6px}
.heatmap{display:flex;gap:3px;flex-wrap:wrap}
.hdot{width:12px;height:12px;border-radius:3px}
.hdot.s0{background:var(--border)}.hdot.s1{background:rgba(255,107,157,.3)}.hdot.s2{background:rgba(255,107,157,.6)}.hdot.s3{background:var(--pri)}.hdot.today{box-shadow:0 0 0 2px var(--pri-l)}

/* Pomodoro */
.pomo-wrap{display:flex;flex-direction:column;align-items:center;padding:30px 0}
.pomo-circle{width:220px;height:220px;border-radius:50%;border:6px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:border-color .3s}
.pomo-circle.running{border-color:var(--pri)}
.pomo-circle.resting{border-color:var(--suc)}
.pomo-time{font-size:48px;font-weight:800;letter-spacing:2px}
.pomo-label{font-size:13px;color:var(--muted);margin-top:4px}
.pomo-progress{position:absolute;inset:-6px;border-radius:50%;pointer-events:none}
.pomo-progress svg{transform:rotate(-90deg)}
.pomo-btns{display:flex;gap:12px;margin-top:24px}
.pomo-btn{padding:12px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.pomo-btn.start{background:var(--pri);color:white}
.pomo-btn.start:hover{background:var(--pri-d)}
.pomo-btn.pause{background:var(--wrn);color:#333}
.pomo-btn.reset{background:var(--card2);color:var(--text)}
.pomo-modes{display:flex;gap:8px;margin-top:20px}
.pomo-mode{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.pomo-mode.active{border-color:var(--pri);color:var(--pri-l);background:rgba(255,107,157,.1)}
.pomo-stats{display:flex;gap:16px;margin-top:24px}
.pomo-stat{text-align:center}
.pomo-stat b{font-size:24px;color:var(--pri-l);display:block}
.pomo-stat small{font-size:11px;color:var(--muted)}
.pomo-hist{margin-top:20px;width:100%}
.pomo-hist-title{font-size:13px;color:var(--muted);margin-bottom:8px}

/* Habits */
.habit-list{display:flex;flex-direction:column;gap:10px}
.habit-card{background:var(--card);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px}
.habit-ck{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;flex-shrink:0}
.habit-ck.checked{background:var(--suc);border-color:var(--suc);color:white}
.habit-info{flex:1}
.habit-name{font-size:14px;font-weight:600}
.habit-streak{font-size:11px;color:var(--muted);margin-top:2px}
.habit-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px}
.habit-del:hover{color:var(--dng)}
.habit-heatmap{margin-top:16px}
.habit-heatmap-title{font-size:13px;color:var(--muted);margin-bottom:6px}

/* Notes */
.note-list{display:flex;flex-direction:column;gap:10px}
.note-card{background:var(--card);border-radius:var(--radius);padding:14px;border-left:4px solid var(--pri);position:relative}
.note-card .note-cat{font-size:10px;color:var(--pri-l);background:rgba(255,107,157,.12);padding:2px 8px;border-radius:8px;display:inline-block}
.note-card .note-text{font-size:13px;margin-top:6px;white-space:pre-wrap;line-height:1.5}
.note-card .note-time{font-size:10px;color:var(--muted);margin-top:6px}
.note-card .note-pin{position:absolute;top:8px;right:8px;font-size:14px;cursor:pointer;opacity:.5}
.note-card .note-pin:hover{opacity:1}
.note-card.pinned{border-left-color:var(--wrn)}
.note-search{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
.note-search:focus{border-color:var(--pri)}
.note-search::placeholder{color:var(--muted)}
.note-cats{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.note-cat-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer}
.note-cat-btn.active{border-color:var(--pri);color:var(--pri-l);background:rgba(255,107,157,.1)}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:flex-end}
.modal-ov.active{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:17px;margin-bottom:16px;text-align:center}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri)}
.fg textarea{resize:vertical;min-height:50px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mactions{display:flex;gap:10px;margin-top:16px}
.mbtn{flex:1;padding:11px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.mbtn-p{background:var(--pri);color:white}.mbtn-p:hover{background:var(--pri-d)}
.mbtn-d{background:var(--dng);color:white}
.mbtn-s{background:var(--border);color:var(--text)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--wrn);color:#333;padding:10px 20px;border-radius:12px;font-weight:700;font-size:13px;z-index:300;box-shadow:0 4px 16px rgba(255,217,61,.3);transition:transform .4s}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Notif banner */
.notif-b{background:linear-gradient(135deg,var(--pri),var(--pri-l));margin:12px 0;padding:14px;border-radius:var(--radius);text-align:center}
.notif-b p{font-size:12px;margin-bottom:8px}
.notif-b button{background:white;color:var(--pri);border:none;padding:7px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px}

/* Settings */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:13px}.setting-label small{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.setting-row input[type="date"]{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Header (shared) -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>📋 Sue学习打卡</h1>
      <div class="date-line" id="hdrDate"></div>
      <div class="lunar-line" id="hdrLunar"></div>
    </div>
    <div class="hdr-right" id="hdrWeather">
      <div class="weather-icon">🌤️</div>
      <div class="weather-temp">--°</div>
      <div class="weather-desc">加载中</div>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  <div class="progress-text"><span id="pLeft"></span><span id="pRight"></span></div>
</div>

<!-- Tab Pages -->
<div class="page active" id="pg-home">
  <div class="stats" id="statsRow"></div>
  <div id="notifBanner" class="notif-b" style="display:none;margin:12px 16px 0">
    <p>🔔 开启通知权限，到点提醒你该干嘛！</p>
    <button onclick="reqNotif()">开启提醒</button>
  </div>
  <div class="sec">
    <div class="sec-title">⏳ 重要倒计时<span class="badge" id="cdBadge"></span></div>
    <div class="countdown-cards" id="cdCards"></div>
  </div>
  <div class="sec">
    <div class="sec-title">📝 今日计划<span class="badge" id="taskBadge">0/0</span></div>
    <div class="task-list" id="taskList"></div>
    <button class="add-btn" onclick="openAddTask()">＋ 添加任务</button>
    <div style="margin-top:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">⚡ 快速模板：</div><div class="templates" id="tplList"></div></div>
  </div>
  <div class="sec">
    <div class="sec-title">💧 喝水打卡<span class="badge" id="waterBadge">0/8杯</span></div>
    <div class="water-row" id="waterRow"></div>
    <div class="water-info" id="waterInfo"></div>
  </div>
  <div class="sec">
    <div class="sec-title">💭 每日心得<span class="badge" id="jBadge">未写</span></div>
    <div class="jcard">
      <div class="jprompt" id="jPrompt"></div>
      <textarea class="jta" id="jText" placeholder="今天学了什么？有什么收获？随便写写..."></textarea>
      <div class="jfoot">
        <span class="jsaved" id="jSaved"></span>
        <div class="moods" id="jMoods"></div>
      </div>
    </div>
    <button class="jhist-toggle" onclick="toggleJHist()">📖 历史心得 ▾</button>
    <div id="jHist" style="display:none"></div>
  </div>
</div>

<div class="page" id="pg-cal">
  <div class="cal-header">
    <button class="cal-nav" onclick="calNav(-1)">◀</button>
    <h2 id="calTitle"></h2>
    <button class="cal-nav" onclick="calNav(1)">▶</button>
  </div>
  <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
  <div class="cal-days" id="calDays"></div>
  <div class="heatmap-title">📅 80天打卡热力图</div>
  <div class="heatmap" id="heatmap"></div>
</div>

<div class="page" id="pg-pomo">
  <div class="pomo-wrap">
    <div class="pomo-circle" id="pomoCircle">
      <div class="pomo-time" id="pomoTime">25:00</div>
      <div class="pomo-label" id="pomoLabel">专注模式</div>
    </div>
    <div class="pomo-btns" id="pomoBtns">
      <button class="pomo-btn start" onclick="pomoStart()">▶ 开始</button>
      <button class="pomo-btn reset" onclick="pomoReset()">↺ 重置</button>
    </div>
    <div class="pomo-modes" id="pomoModes"></div>
    <div class="pomo-stats">
      <div class="pomo-stat"><b id="pomoToday">0</b><small>今日番茄</small></div>
      <div class="pomo-stat"><b id="pomoTotal">0</b><small>累计番茄</small></div>
      <div class="pomo-stat"><b id="pomoMins">0</b><small>专注分钟</small></div>
    </div>
    <div class="pomo-hist"><div class="pomo-hist-title">今日记录</div><div id="pomoHist"></div></div>
  </div>
</div>

<div class="page" id="pg-habit">
  <div class="sec">
    <div class="sec-title">🎯 每日习惯<span class="badge" id="habitBadge">0/0</span></div>
    <div class="habit-list" id="habitList"></div>
    <button class="add-btn" onclick="openAddHabit()">＋ 添加习惯</button>
  </div>
  <div class="sec">
    <div class="habit-heatmap-title">习惯完成率（近30天）</div>
    <div class="heatmap" id="habitHeatmap"></div>
  </div>
</div>

<div class="page" id="pg-note">
  <input class="note-search" id="noteSearch" placeholder="🔍 搜索便签..." oninput="renderNotes()">
  <div class="note-cats" id="noteCats"></div>
  <div class="note-list" id="noteList"></div>
  <button class="add-btn" onclick="openAddNote()">＋ 新建便签</button>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('home',this)"><span class="tab-icon">🏠</span>今日</button>
  <button class="tab-btn" onclick="switchTab('cal',this)"><span class="tab-icon">📅</span>日历</button>
  <button class="tab-btn" onclick="switchTab('pomo',this)"><span class="tab-icon">⏱️</span>番茄</button>

<script>
// ============ CONFIG ============
const DEFAULT_SETTINGS = { startDate:'2026-05-20', endDate:'2026-08-07', examDate:'2026-11-28', regDate:'2026-08-11' };
const TEMPLATES = [
  {name:'🌅 早读英语',start:'06:30',end:'07:00',note:'百词斩背高中词汇',color:'#FF6B9D'},
  {name:'📉 看盘',start:'09:30',end:'11:30',note:'只看不交易，记录盘面',color:'#FFA8C5'},
  {name:'📖 基金从业',start:'08:00',end:'10:00',note:'三色笔记+万题库刷题',color:'#00D2A0'},
  {name:'☕ 休息',start:'10:00',end:'10:15',note:'起来走走喝口水',color:'#FFD93D'},
  {name:'📊 财报分析',start:'10:15',end:'12:00',note:'《手把手教你读财报》+年报实操',color:'#FF6B6B'},
  {name:'🍱 午饭+午休',start:'12:00',end:'13:30',note:'',color:'#FFD93D'},
  {name:'📉 午盘',start:'13:00',end:'15:00',note:'下午盘面观察',color:'#FFA8C5'},
  {name:'🎧 CFA英语',start:'14:00',end:'15:30',note:'Mark Meldrum视频+跟读',color:'#74B9FF'},
  {name:'💰 CFA词汇',start:'21:00',end:'21:45',note:'金程词汇书+有道词典',color:'#74B9FF'},
  {name:'📝 复盘总结',start:'22:00',end:'22:30',note:'今日学习总结+明日计划',color:'#FF6B9D'},
];
const JOURNAL_PROMPTS = ['💡 今天学到了什么新知识点？','🎯 今天最专注的是哪个任务？','🤔 遇到了什么难点？怎么解决的？','📈 跟昨天比，有什么进步？','🔮 明天最想突破什么？','💪 今天最坚持的一件事是什么？','🧠 有什么知识突然想通了？'];
const DEFAULT_HABITS = [{name:'早起(6:30前)',icon:'🌅'},{name:'运动30分钟',icon:'🏃'},{name:'背单词',icon:'📖'},{name:'阅读',icon:'📚'},{name:'复盘总结',icon:'📝'}];
const POMO_MODES = [{label:'15分钟',work:15,rest:5},{label:'25分钟',work:25,rest:5},{label:'30分钟',work:30,rest:5},{label:'45分钟',work:45,rest:10}];
const MOODS = ['😊','😐','😤','😴','🔥'];
const NOTE_CATS = ['全部','学习','炒股','生活','其他'];

// ============ LUNAR CALENDAR ============
// 2026 lunar data: month start (solar date) and days
const LUNAR_MONTHS_2026 = [
  {m:1, solar:'2026-02-17', days:30}, // 正月
  {m:2, solar:'2026-03-19', days:29}, // 二月
  {m:3, solar:'2026-04-17', days:30}, // 三月
  {m:4, solar:'2026-05-17', days:29}, // 四月
  {m:5, solar:'2026-06-15', days:30}, // 五月
  {m:6, solar:'2026-07-15', days:29}, // 六月
  {m:7, solar:'2026-08-13', days:30}, // 七月
  {m:8, solar:'2026-09-12', days:29}, // 八月
  {m:9, solar:'2026-10-11', days:30}, // 九月
  {m:10,solar:'2026-11-10', days:29}, // 十月
  {m:11,solar:'2026-12-09', days:30}, // 十一月
  {m:12,solar:'2027-01-08', days:30}, // 十二月
];
const LUNAR_NAMES = ['','正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAY_NAMES = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

// Solar terms 2026 (May-August)
const SOLAR_TERMS = {'2026-05-21':'小满','2026-06-05':'芒种','2026-06-21':'夏至','2026-07-07':'小暑','2026-07-23':'大暑','2026-08-07':'立秋'};

// Traditional festivals 2026
const FESTIVALS = {'2026-05-31':'端午','2026-08-19':'七夕'};

function getLunarDate(solarDate) {
  const d = typeof solarDate === 'string' ? new Date(solarDate + 'T00:00:00') : new Date(solarDate);
  d.setHours(0,0,0,0);
  for (let i = LUNAR_MONTHS_2026.length - 1; i >= 0; i--) {
    const lm = LUNAR_MONTHS_2026[i];
    const ms = new Date(lm.solar + 'T00:00:00');
    ms.setHours(0,0,0,0);
    const diff = Math.floor((d - ms) / 86400000);
    if (diff >= 0 && diff < lm.days) {
      return { month: lm.m, day: diff + 1, monthName: LUNAR_NAMES[lm.m] + '月', dayName: LUNAR_DAY_NAMES[diff + 1] };
    }
  }
  return null;
}

function getLunarShort(solarDate) {
  const key = fmtDate(solarDate);
  if (SOLAR_TERMS[key]) return { text: SOLAR_TERMS[key], cls: 'term' };
  if (FESTIVALS[key]) return { text: FESTIVALS[key], cls: 'fest' };
  const l = getLunarDate(solarDate);
  if (!l) return { text: '', cls: '' };
  if (l.day === 1) return { text: l.monthName, cls: 'fest' };
  return { text: l.dayName, cls: '' };
}

// ============ STATE ============
let editTaskId = null, editNoteId = null, delCallback = null;
let pomoTimer = null, pomoSec = 0, pomoRunning = false, pomoMode = 1; // default 25min
let calYear, calMonth;
let jSaveTimer = null;
let noteCatFilter = 0;

// ============ UTILS ============
function fmtDate(d) { const x = d instanceof Date ? d : new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function todayKey() { return fmtDate(new Date()); }
function t2m(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowStr() { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }

function S(k,v) { if(v!==undefined) localStorage.setItem(k,JSON.stringify(v)); else { const x=localStorage.getItem(k); return x?JSON.parse(x):undefined; } }
function getS(k,def) { const v=S(k); return v!==undefined?v:def; }

function getSettings() { return getS('settings', DEFAULT_SETTINGS); }
function getStart() { return new Date(getSettings().startDate + 'T00:00:00'); }
function getEnd() { return new Date(getSettings().endDate + 'T00:00:00'); }
function getTotalDays() { return Math.max(1, Math.round((getEnd() - getStart()) / 86400000) + 1); }
function getDayNum() { const t=new Date();t.setHours(0,0,0,0); return Math.max(1, Math.floor((t - getStart()) / 86400000) + 1); }
function daysLeft() { const t=new Date();t.setHours(0,0,0,0); return Math.max(0, Math.ceil((getEnd() - t) / 86400000)); }

// ============ WEATHER ============
let weatherCache = null, weatherTime = 0;
async function fetchWeather() {
  const now = Date.now();
  if (weatherCache && now - weatherTime < 3600000) return weatherCache;
  try {
    const r = await fetch('https://wttr.in/Quanzhou?format=j1');
    const d = await r.json();
    const c = d.current_condition[0];
    const desc = c.lang_zh && c.lang_zh[0] ? c.lang_zh[0].value : c.weatherDesc[0].value;
    weatherCache = { temp: c.temp_C, feel: c.FeelsLikeC, hum: c.humidity, desc, code: parseInt(c.weatherCode) };
    weatherTime = now;
    return weatherCache;
  } catch(e) { return weatherCache || { temp:'--', feel:'--', hum:'--', desc:'获取失败', code:0 }; }
}
function weatherIcon(code) {
  if (code === 113) return '☀️'; if (code === 116) return '⛅';
  if (code < 120) return '🌤️'; if (code < 200) return '☁️';
  if (code < 300) return '🌧️'; if (code < 400) return '⛈️';
  if (code < 500) return '❄️'; if (code < 600) return '🌫️';
  return '🌤️';
}
function dressTip(temp) {
  const t = parseInt(temp); if(isNaN(t)) return '';
  if(t>=30) return '🩱 短袖短裤'; if(t>=25) return '👕 薄T恤';
  if(t>=20) return '🧥 薄外套'; if(t>=15) return '🧥 夹克衫';
  if(t>=10) return '🧥 毛衣外套'; return '🧣 厚羽绒服';
}
async function renderWeather() {
  const w = await fetchWeather();
  const el = document.getElementById('hdrWeather');
  el.innerHTML = `<div class="weather-icon">${weatherIcon(w.code)}</div><div class="weather-temp">${w.temp}°</div><div class="weather-desc">${w.desc} · ${dressTip(w.temp)}</div>`;
}

// ============ HEADER ============
function renderHeader() {
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  document.getElementById('hdrDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 周${wd[now.getDay()]}`;
  const l = getLunarDate(now);
  document.getElementById('hdrLunar').textContent = l ? `🏮 农历${l.monthName}${l.dayName} · 丙午年` : '';
  const total = getTotalDays(), dn = getDayNum(), left = daysLeft();
  const pct = Math.min(100, Math.max(0, (dn / total) * 100));
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLeft').textContent = `第${dn}天 / 共${total}天`;
  document.getElementById('pRight').textContent = `剩余${left}天`;
  renderWeather();
}

// ============ STATS ============
function renderStats() {
  const dk = todayKey(), tasks = getS('tasks_'+dk, []), done = tasks.filter(t=>t.completed).length;
  const habits = getS('habits', DEFAULT_HABITS), hc = getS('hcheck_'+dk, {});
  const hdone = Object.values(hc).filter(v=>v).length;
  let streak = 0;
  for (let i = 0; i < getTotalDays(); i++) {
    const d = new Date(); d.setDate(d.getDate()-i); const k = fmtDate(d);
    const dt = getS('tasks_'+k,[]); if(!dt.length) continue;
    if(dt.every(t=>t.completed)) streak++; else if(i===0) break; else break;
  }
  const rate = (tasks.length+habits.length) > 0 ? Math.round(((done+hdone)/(tasks.length+habits.length))*100) : 0;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><b class="p1">${getDayNum()}</b><small>第几天</small></div>
    <div class="stat"><b class="p2">${done}/${tasks.length}</b><small>任务完成</small></div>
    <div class="stat"><b class="p3">${streak}</b><small>连续打卡</small></div>
    <div class="stat"><b class="p4">${rate}%</b><small>完成率</small></div>`;
}

// ============ COUNTDOWN ============
function renderCountdown() {
  const s = getSettings(), today = new Date(); today.setHours(0,0,0,0);
  const items = [
    { label:'报名截止', date: s.regDate, color:'var(--wrn)' },
    { label:'学习期结束', date: s.endDate, color:'var(--pri)' },
    { label:'基金从业考试', date: s.examDate, color:'var(--suc)' },
    { label:'立秋', date: '2026-08-07', color:'var(--pri-l)' },
  ];
  document.getElementById('cdCards').innerHTML = items.map(it => {
    const d = new Date(it.date+'T00:00:00'); d.setHours(0,0,0,0);
    const diff = Math.ceil((d - today) / 86400000);
    return `<div class="cd-card"><div class="cd-num" style="color:${it.color}">${diff > 0 ? diff : 0}</div><div class="cd-label">${it.label}</div><div class="cd-date">${it.date}</div></div>`;
  }).join('');
  document.getElementById('cdBadge').textContent = `${items.length}个`;
}

// ============ TASKS ============
function renderTasks() {
  const dk = todayKey(), tasks = getS('tasks_'+dk,[]), done = tasks.filter(t=>t.completed).length;
  document.getElementById('taskBadge').textContent = `${done}/${tasks.length}`;
  if (!tasks.length) { document.getElementById('taskList').innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">📝</div><div style="font-size:13px">今天还没有计划</div></div>'; return; }
  tasks.sort((a,b) => t2m(a.start)-t2m(b.start));
  const nm = t2m(nowStr());
  document.getElementById('taskList').innerHTML = tasks.map(t => {
    const sm=t2m(t.start), em=t2m(t.end);
    let cls = t.completed ? 'done' : nm>=sm && nm<=em ? 'now' : nm>em ? 'late' : '';
    return `<div class="tcard ${cls}" style="border-left-color:${t.color||'var(--pri)'}">
      <div class="ttop"><span class="ttime">${t.start}-${t.end}</span><div class="tacts">
        <button class="tbtn ck" onclick="toggleTask('${t.id}')">${t.completed?'✅':'⬜'}</button>
        <button class="tbtn" onclick="editTask('${t.id}')">✏️</button>
        <button class="tbtn" onclick="delTask('${t.id}')">🗑️</button>
      </div></div><div class="tname">${t.name}</div>${t.note?`<div class="tnote">${t.note}</div>`:''}</div>`;
  }).join('');
}
function toggleTask(id) {
  const dk=todayKey(), tasks=getS('tasks_'+dk,[]), t=tasks.find(x=>x.id===id);
  if(t){t.completed=!t.completed; S('tasks_'+dk,tasks); renderAll();
    if(t.completed&&tasks.every(x=>x.completed)) toast('🎉 今日任务全部完成！');}
}
function openAddTask(){editTaskId=null;document.getElementById('taskModalTitle').textContent='添加任务';document.getElementById('tName').value='';document.getElementById('tStart').value='';document.getElementById('tEnd').value='';document.getElementById('tNote').value='';openModal('taskModal');}
function editTask(id){const dk=todayKey(),tasks=getS('tasks_'+dk,[]),t=tasks.find(x=>x.id===id);if(!t)return;editTaskId=id;document.getElementById('taskModalTitle').textContent='编辑任务';document.getElementById('tName').value=t.name;document.getElementById('tStart').value=t.start;document.getElementById('tEnd').value=t.end;document.getElementById('tNote').value=t.note||'';openModal('taskModal');}
function saveTask(){const n=document.getElementById('tName').value.trim(),s=document.getElementById('tStart').value,e=document.getElementById('tEnd').value,nt=document.getElementById('tNote').value.trim();if(!n||!s||!e){toast('⚠️ 请填写完整');return;}const dk=todayKey(),tasks=getS('tasks_'+dk,[]);if(editTaskId){const t=tasks.find(x=>x.id===editTaskId);if(t){t.name=n;t.start=s;t.end=e;t.note=nt;}}else{tasks.push({id:'t_'+Date.now(),name:n,start:s,end:e,note:nt,color:TEMPLATES[tasks.length%TEMPLATES.length].color,completed:false});}S('tasks_'+dk,tasks);closeModal('taskModal');renderAll();toast('✅ 已保存');}
function delTask(id){openModal('delModal');document.getElementById('delConfirm').onclick=()=>{const dk=todayKey();let tasks=getS('tasks_'+dk,[]);tasks=tasks.filter(x=>x.id!==id);S('tasks_'+dk,tasks);closeModal('delModal');renderAll();toast('🗑️ 已删除');};}
function addTpl(i){const t=TEMPLATES[i],dk=todayKey(),tasks=getS('tasks_'+dk,[]);if(tasks.some(x=>x.name===t.name)){toast('⚠️ 已存在');return;}tasks.push({id:'t_'+Date.now(),name:t.name,start:t.start,end:t.end,note:t.note,color:t.color,completed:false});S('tasks_'+dk,tasks);renderAll();toast(`✅ 已添加「${t.name}」`);}
function renderTpls(){document.getElementById('tplList').innerHTML=TEMPLATES.map((t,i)=>`<div class="tchip" onclick="addTpl(${i})">${t.name}</div>`).join('');}

// ============ WATER ============
function renderWater(){
  const dk=todayKey(),w=getS('water_'+dk,0);let h='';
  for(let i=0;i<8;i++) h+=`<span class="water-cup${i<w?' filled':''}" onclick="setWater(${i+1})">${i<w?'🥛':'🫗'}</span>`;
  document.getElementById('waterRow').innerHTML=h;
  document.getElementById('waterBadge').textContent=`${w}/8杯`;
  document.getElementById('waterInfo').textContent=w>=8?'💧 今日饮水目标完成！':`还需${8-w}杯，约${(8-w)*250}ml`;
}
function setWater(n){S('water_'+todayKey(),n);renderAll();if(n>=8) toast('💧 喝水目标完成！');}

// ============ JOURNAL ============
function renderJournal(){
  const dk=todayKey(),j=getS('journal_'+dk,{text:'',mood:''}),dn=getDayNum();
  document.getElementById('jPrompt').textContent=JOURNAL_PROMPTS[(dn-1)%JOURNAL_PROMPTS.length];
  document.getElementById('jText').value=j.text;
  document.getElementById('jBadge').textContent=j.text.trim()?'✅ 已写':'未写';
  document.getElementById('jBadge').style.background=j.text.trim()?'var(--suc)':'var(--pri)';
  document.getElementById('jSaved').textContent=j.text.trim()?'已自动保存':'';
  document.getElementById('jMoods').innerHTML=MOODS.map(m=>`<button class="mbtn${j.mood===m?' sel':''}" onclick="setMood('${m}')">${m}</button>`).join('');
  document.getElementById('jText').oninput=()=>{clearTimeout(jSaveTimer);jSaveTimer=setTimeout(()=>{const jj={text:document.getElementById('jText').value,mood:getS('journal_'+todayKey(),{}).mood||''};S('journal_'+todayKey(),jj);document.getElementById('jSaved').textContent='✓ 已保存';setTimeout(()=>document.getElementById('jSaved').textContent='已自动保存',1500);document.getElementById('jBadge').textContent=jj.text.trim()?'✅ 已写':'未写';document.getElementById('jBadge').style.background=jj.text.trim()?'var(--suc)':'var(--pri)';},800);};
}
function setMood(m){const dk=todayKey(),j=getS('journal_'+dk,{text:'',mood:''});j.mood=m;S('journal_'+dk,j);renderJournal();}
function toggleJHist(){const el=document.getElementById('jHist'),btn=event.target;if(el.style.display==='none'){el.style.display='block';btn.textContent='📖 收起 ▴';let h='';for(let i=1;i<=30;i++){const d=new Date();d.setDate(d.getDate()-i);const k=fmtDate(d),j=getS('journal_'+k);if(j&&j.text.trim()) h+=`<div class="jentry"><span class="jentry-date">${k} ${j.mood||''}</span><div class="jentry-text">${j.text.replace(/</g,'&lt;')}</div></div>`;}el.innerHTML=h||'<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">暂无</div>';}else{el.style.display='none';btn.textContent='📖 历史心得 ▾';}}

// ============ CALENDAR ============
function initCal(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
  const first=new Date(calYear,calMonth,1), lastDay=new Date(calYear,calMonth+1,0).getDate();
  const startDow=first.getDay(),today=fmtDate(new Date());
  let h='';
  // prev month fill
  const prevLast=new Date(calYear,calMonth,0).getDate();
  for(let i=startDow-1;i>=0;i--){const d=prevLast-i;const dt=new Date(calYear,calMonth-1,d);const ls=getLunarShort(dt);h+=`<div class="cal-day other-month"><span>${d}</span><span class="lunar ${ls.cls}">${ls.text}</span></div>`;}
  // this month
  for(let d=1;d<=lastDay;d++){
    const dt=new Date(calYear,calMonth,d);const k=fmtDate(dt);const ls=getLunarShort(dt);
    const isToday=k===today;const tasks=getS('tasks_'+k,[]);const hasChk=tasks.some(t=>t.completed);
    h+=`<div class="cal-day${isToday?' today':''}"><span>${d}</span><span class="lunar ${ls.cls}">${ls.text}</span>${hasChk?'<div class="chk-dot"></div>':''}</div>`;
  }
  // next month fill
  const totalCells=startDow+lastDay;const remain=totalCells%7===0?0:7-totalCells%7;
  for(let d=1;d<=remain;d++){const dt=new Date(calYear,calMonth+1,d);const ls=getLunarShort(dt);h+=`<div class="cal-day other-month"><span>${d}</span><span class="lunar ${ls.cls}">${ls.text}</span></div>`;}
  document.getElementById('calDays').innerHTML=h;
  renderHeatmap();
}
function renderHeatmap(){
  const start=getStart(),total=getTotalDays();let h='',checked=0;
  for(let i=0;i<total;i++){const d=new Date(start);d.setDate(d.getDate()+i);const k=fmtDate(d);const tasks=getS('tasks_'+k,[]);const done=tasks.filter(t=>t.completed).length;
    let cls='s0';if(tasks.length){if(done===tasks.length){cls='s3';checked++;}else if(done>0)cls='s2';else cls='s1';}
    const isToday=k===todayKey();h+=`<div class="hdot ${cls}${isToday?' today':''}" title="${k}"></div>`;}
  document.getElementById('heatmap').innerHTML=h;
}

// ============ POMODORO ============
function renderPomo(){
  const modes=POMO_MODES;document.getElementById('pomoModes').innerHTML=modes.map((m,i)=>`<button class="pomo-mode${i===pomoMode?' active':''}" onclick="setPomoMode(${i})">${m.label}</button>`).join('');
  renderPomoTime();renderPomoStats();
}
function setPomoMode(i){if(pomoRunning)return;pomoMode=i;pomoSec=POMO_MODES[i].work*60;renderPomo();}
function renderPomoTime(){const m=Math.floor(pomoSec/60),s=pomoSec%60;document.getElementById('pomoTime').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function renderPomoStats(){
  const dk=todayKey(),hist=getS('pomo_'+dk,[]);
  document.getElementById('pomoToday').textContent=hist.length;
  let total=0,mins=0;for(let i=0;i<365;i++){const d=new Date();d.setDate(d.getDate()-i);const h=getS('pomo_'+fmtDate(d),[]);total+=h.length;mins+=h.reduce((a,b)=>a+b.mins,0);}
  document.getElementById('pomoTotal').textContent=total;document.getElementById('pomoMins').textContent=mins;
  document.getElementById('pomoHist').innerHTML=hist.length?hist.map(h=>`<div style="font-size:11px;color:var(--muted);padding:4px 0">${h.time} · ${h.mins}分钟 ${h.type==='work'?'🍅':'🌿'}</div>`).join(''):'<div style="font-size:11px;color:var(--muted);padding:8px">暂无记录</div>';
}
function pomoStart(){
  if(pomoRunning){pomoRunning=false;clearInterval(pomoTimer);document.getElementById('pomoBtns').innerHTML='<button class="pomo-btn start" onclick="pomoStart()">▶ 继续</button><button class="pomo-btn reset" onclick="pomoReset()">↺ 重置</button>';return;}
  if(pomoSec<=0)pomoSec=POMO_MODES[pomoMode].work*60;
  pomoRunning=true;
  const isWork=pomoSec>0&&document.getElementById('pomoLabel').textContent==='专注模式';
  document.getElementById('pomoCircle').className='pomo-circle'+(isWork?' running':' resting');
  document.getElementById('pomoBtns').innerHTML='<button class="pomo-btn pause" onclick="pomoStart()">⏸ 暂停</button><button class="pomo-btn reset" onclick="pomoReset()">↺ 重置</button>';
  pomoTimer=setInterval(()=>{
    pomoSec--;renderPomoTime();
    if(pomoSec<=0){clearInterval(pomoTimer);pomoRunning=false;
      const dk=todayKey(),hist=getS('pomo_'+dk,[]);
      const now=new Date();const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const label=document.getElementById('pomoLabel').textContent;
      if(label==='专注模式'){hist.push({time,mins:POMO_MODES[pomoMode].work,type:'work'});S('pomo_'+dk,hist);
        toast('🍅 专注完成！休息5分钟');document.getElementById('pomoLabel').textContent='休息模式';pomoSec=POMO_MODES[pomoMode].rest*60;document.getElementById('pomoCircle').className='pomo-circle resting';
      }else{hist.push({time,mins:POMO_MODES[pomoMode].rest,type:'rest'});S('pomo_'+dk,hist);
        toast('🌿 休息结束！继续加油');document.getElementById('pomoLabel').textContent='专注模式';pomoSec=POMO_MODES[pomoMode].work*60;document.getElementById('pomoCircle').className='pomo-circle running';}
      document.getElementById('pomoBtns').innerHTML='<button class="pomo-btn start" onclick="pomoStart()">▶ 开始</button><button class="pomo-btn reset" onclick="pomoReset()">↺ 重置</button>';
      renderPomoStats();pomoStart();}
  },1000);
}
function pomoReset(){clearInterval(pomoTimer);pomoRunning=false;pomoSec=POMO_MODES[pomoMode].work*60;document.getElementById('pomoCircle').className='pomo-circle';document.getElementById('pomoLabel').textContent='专注模式';document.getElementById('pomoBtns').innerHTML='<button class="pomo-btn start" onclick="pomoStart()">▶ 开始</button><button class="pomo-btn reset" onclick="pomoReset()">↺ 重置</button>';renderPomoTime();}

// ============ HABITS ============
function renderHabits(){
  const habits=getS('habits',DEFAULT_HABITS),dk=todayKey(),hc=getS('hcheck_'+dk,{});
  const hdone=Object.values(hc).filter(v=>v).length;
  document.getElementById('habitBadge').textContent=`${hdone}/${habits.length}`;
  document.getElementById('habitList').innerHTML=habits.map((h,i)=>{
    const checked=hc[i];let streak=0;
    for(let d=0;d<365;d++){const dt=new Date();dt.setDate(dt.getDate()-d);const c=getS('hcheck_'+fmtDate(dt),{});if(c[i])streak++;else if(d===0)continue;else break;}
    return `<div class="habit-card"><div class="habit-ck${checked?' checked':''}" onclick="toggleHabit(${i})">${checked?'✓':''}</div><div class="habit-info"><div class="habit-name">${h.icon} ${h.name}</div><div class="habit-streak">🔥 连续${streak}天</div></div><button class="habit-del" onclick="delHabit(${i})">🗑️</button></div>`;
  }).join('');
  renderHabitHeatmap();
}
function toggleHabit(i){const dk=todayKey(),hc=getS('hcheck_'+dk,{});hc[i]=!hc[i];S('hcheck_'+dk,hc);renderAll();}
function openAddHabit(){document.getElementById('hName').value='';document.getElementById('hIcon').value='🎯';openModal('habitModal');}
function saveHabit(){const n=document.getElementById('hName').value.trim(),ic=document.getElementById('hIcon').value.trim()||'🎯';if(!n){toast('⚠️ 请输入名称');return;}const habits=getS('habits',DEFAULT_HABITS);habits.push({name:n,icon:ic});S('habits',habits);closeModal('habitModal');renderAll();toast('✅ 已添加');}
function delHabit(i){openModal('delModal');document.getElementById('delConfirm').onclick=()=>{const habits=getS('habits',DEFAULT_HABITS);habits.splice(i,1);S('habits',habits);closeModal('delModal');renderAll();toast('🗑️ 已删除');};}
function renderHabitHeatmap(){
  let h='';for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=fmtDate(d);const hc=getS('hcheck_'+k,{});const habits=getS('habits',DEFAULT_HABITS);const done=Object.values(hc).filter(v=>v).length;const total=habits.length;
    let cls='s0';if(total){const r=done/total;if(r>=1)cls='s3';else if(r>=.5)cls='s2';else if(r>0)cls='s1';}
    h+=`<div class="hdot ${cls}" title="${k}"></div>`;}
  document.getElementById('habitHeatmap').innerHTML=h;
}

// ============ NOTES ============
function renderNotes(){
  const notes=getS('notes',[]),q=document.getElementById('noteSearch').value.toLowerCase();
  document.getElementById('noteCats').innerHTML=NOTE_CATS.map((c,i)=>`<button class="note-cat-btn${i===noteCatFilter?' active':''}" onclick="noteCatFilter=${i};renderNotes()">${c}</button>`).join('');
  let filtered=notes.filter(n=>{if(noteCatFilter>0&&n.cat!==NOTE_CATS[noteCatFilter])return false;if(q&&!n.text.toLowerCase().includes(q))return false;return true;});
  filtered.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.ts-a.ts);
  document.getElementById('noteList').innerHTML=filtered.length?filtered.map(n=>`<div class="note-card${n.pinned?' pinned':''}">
    <span class="note-cat">${n.cat}</span><span class="note-pin" onclick="pinNote('${n.id}')">${n.pinned?'📌':'📍'}</span>
    <div class="note-text">${n.text.replace(/</g,'&lt;')}</div><div class="note-time">${new Date(n.ts).toLocaleString('zh-CN')}</div>
    <div style="margin-top:6px"><button class="tbtn" onclick="editNote('${n.id}')">✏️</button><button class="tbtn" onclick="delNote('${n.id}')">🗑️</button></div></div>`).join('')
    :'<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">暂无便签</div>';
}
function openAddNote(){editNoteId=null;document.getElementById('noteModalTitle').textContent='新建便签';document.getElementById('nText').value='';document.getElementById('nCat').selectedIndex=0;openModal('noteModal');}
function editNote(id){const notes=getS('notes',[]),n=notes.find(x=>x.id===id);if(!n)return;editNoteId=id;document.getElementById('noteModalTitle').textContent='编辑便签';document.getElementById('nText').value=n.text;document.getElementById('nCat').value=n.cat;openModal('noteModal');}
function saveNote(){const t=document.getElementById('nText').value.trim(),c=document.getElementById('nCat').value;if(!t){toast('⚠️ 请输入内容');return;}const notes=getS('notes',[]);if(editNoteId){const n=notes.find(x=>x.id===editNoteId);if(n){n.text=t;n.cat=c;n.ts=Date.now();}}else{notes.push({id:'n_'+Date.now(),text:t,cat:c,ts:Date.now(),pinned:false});}S('notes',notes);closeModal('noteModal');renderAll();toast('✅ 已保存');}
function delNote(id){openModal('delModal');document.getElementById('delConfirm').onclick=()=>{let notes=getS('notes',[]);notes=notes.filter(x=>x.id!==id);S('notes',notes);closeModal('delModal');renderAll();toast('🗑️ 已删除');};}
function pinNote(id){const notes=getS('notes',[]),n=notes.find(x=>x.id===id);if(n){n.pinned=!n.pinned;S('notes',notes);renderNotes();}}

// ============ SETTINGS ============
function openSettings(){const s=getSettings();document.getElementById('sStart').value=s.startDate;document.getElementById('sEnd').value=s.endDate;document.getElementById('sExam').value=s.examDate;document.getElementById('sReg').value=s.regDate;openModal('settingsModal');}
function saveSettings(){S('settings',{startDate:document.getElementById('sStart').value,endDate:document.getElementById('sEnd').value,examDate:document.getElementById('sExam').value,regDate:document.getElementById('sReg').value});renderAll();}

// ============ NOTIFICATIONS ============
function checkNotif(){if('Notification' in window && Notification.permission==='default') document.getElementById('notifBanner').style.display='block';}
function reqNotif(){if('Notification' in window) Notification.requestPermission().then(p=>{document.getElementById('notifBanner').style.display='none';if(p==='granted') toast('🔔 提醒已开启！');});}
function setupReminders(){reminderTimers.forEach(t=>clearTimeout(t));reminderTimers=[];
  const dk=todayKey(),tasks=getS('tasks_'+dk,[]),now=new Date();
  tasks.forEach(t=>{if(t.completed)return;const[h,m]=t.start.split(':').map(Number);const tt=new Date();tt.setHours(h,m,0,0);const diff=tt-now;
    if(diff>0&&diff<86400000){const timer=setTimeout(()=>{toast(`⏰ 该做「${t.name}」了！`);if('Notification' in window&&Notification.permission==='granted') new Notification('📋 学习提醒',{body:`该做「${t.name}」了！（${t.start}-${t.end}）`});},diff);reminderTimers.push(timer);}});
}

// ============ TABS ============
function switchTab(name,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('pg-'+name).classList.add('active');btn.classList.add('active');if(name==='cal'){initCal();renderCal();}if(name==='pomo')renderPomo();if(name==='habit')renderHabits();if(name==='note')renderNotes();}

// ============ MODAL ============
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');editTaskId=null;editNoteId=null;}

// ============ TOAST ============
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ============ RENDER ALL ============
let reminderTimers = [];
function renderAll(){renderHeader();renderStats();renderCountdown();renderTasks();renderTpls();renderWater();renderJournal();renderPomo();renderHabits();renderNotes();checkNotif();}

// ============ INIT ============
initCal();
renderAll();
setupReminders();
setInterval(()=>{renderTasks();renderStats();},60000);

// PWA
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
</script>
