<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📋 定制你的专属打卡App</title>
<style>
:root{--pri:#FF6B9D;--pri-l:#FFA8C5;--bg:#0f0f17;--card:#1a1a28;--card2:#242438;--text:#e8e0f0;--muted:#8888aa;--border:#2a2a40;--suc:#00D2A0;--wrn:#FFD93D;--dng:#FF6B6B;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.8;padding:20px 16px 80px}
h1{text-align:center;font-size:22px;margin-bottom:4px;color:var(--pri)}
.subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:24px}
.section{background:var(--card);border-radius:var(--radius);padding:18px;margin:16px 0;border:1px solid var(--border)}
.section h2{font-size:17px;color:var(--pri);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri)}
.fg textarea{resize:vertical;min-height:60px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Color picker */
.color-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:6px}
.color-swatch{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:white;transform:scale(1.2);box-shadow:0 0 12px var(--pri)}
.color-custom{position:relative;width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px dashed var(--muted);cursor:pointer}
.color-custom input[type="color"]{position:absolute;inset:-10px;width:60px;height:60px;cursor:pointer;opacity:0}
.color-custom-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;pointer-events:none}
.color-name{font-size:12px;color:var(--muted);margin-top:6px}

/* Pattern picker */
.pattern-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.pattern-card{background:var(--card2);border:2px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .2s;font-size:12px}
.pattern-card:hover{border-color:var(--pri-l)}
.pattern-card.selected{border-color:var(--pri);background:rgba(255,107,157,.1)}
.pattern-card .pt-icon{font-size:22px;display:block}
.pattern-card .pt-name{margin-top:2px;font-size:11px}

/* Task rows */
.task-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.task-row input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none}
.task-row input:focus{border-color:var(--pri)}
.task-row .t-name{flex:2;min-width:120px}
.task-row .t-time{width:80px}
.task-row .t-note{flex:1;min-width:80px}
.task-row button{background:none;border:none;cursor:pointer;font-size:18px;padding:4px}
.add-row-btn{width:100%;padding:10px;background:rgba(255,107,157,.1);border:2px dashed var(--pri);border-radius:10px;color:var(--pri-l);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.add-row-btn:hover{background:rgba(255,107,157,.18)}

/* Habit rows */
.habit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.habit-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none}
.habit-row input:focus{border-color:var(--pri)}
.habit-row select{width:60px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px;color:var(--text);font-size:16px;outline:none}

/* Generate button */
.gen-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,var(--pri),var(--pri-l));color:white;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;margin-top:24px;box-shadow:0 4px 20px rgba(255,107,157,.3)}
.gen-btn:hover{opacity:.9;transform:translateY(-1px)}

/* Result area */
.result-area{display:none;margin-top:20px}
.result-area.show{display:block}
.result-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;line-height:1.6;color:var(--suc)}
.copy-btn{display:block;width:100%;padding:14px;background:var(--suc);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.copy-btn:hover{opacity:.9}
.copied-msg{text-align:center;color:var(--suc);font-size:14px;margin-top:8px;display:none}
.copied-msg.show{display:block}

.tip{background:rgba(255,107,157,.08);border-left:4px solid var(--pri);border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 0;font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<h1>📋 定制你的专属打卡App</h1>
<div class="subtitle">填完这张表，1-3天交付你的专属版本</div>

<!-- ========== 基础信息 ========== -->
<div class="section">
<h2>👤 基础信息</h2>
<div class="fg"><label>App名称</label><input id="appName" placeholder="比如：小红的CPA冲刺" value="我的打卡"></div>
<div class="fg"><label>你的城市（用于天气显示）</label><select id="city">
  <option value="Quanzhou">泉州</option><option value="Beijing">北京</option><option value="Shanghai">上海</option>
  <option value="Guangzhou">广州</option><option value="Shenzhen">深圳</option><option value="Chengdu">成都</option>
  <option value="Hangzhou">杭州</option><option value="Nanjing">南京</option><option value="Wuhan">武汉</option>
  <option value="Xiamen">厦门</option><option value="Fuzhou">福州</option><option value="Changsha">长沙</option>
  <option value="Zhengzhou">郑州</option><option value="Jinan">济南</option><option value="Qingdao">青岛</option>
  <option value="Dalian">大连</option><option value="Shenyang">沈阳</option><option value="Harbin">哈尔滨</option>
  <option value="Xian">西安</option><option value="Chongqing">重庆</option><option value="Kunming">昆明</option>
  <option value="Guiyang">贵阳</option><option value="Nanning">南宁</option><option value="Hefei">合肥</option>
  <option value="Nanchang">南昌</option><option value="Taiyuan">太原</option><option value="Shijiazhuang">石家庄</option>
  <option value="Lanzhou">兰州</option><option value="Urumqi">乌鲁木齐</option><option value="Haikou">海口</option>
  <option value="Sanya">三亚</option><option value="Suzhou">苏州</option><option value="Tianjin">天津</option>
  <option value="other">其他城市</option>
</select></div>
<div class="fg" id="otherCityBox" style="display:none"><label>请输入城市英文名</label><input id="otherCity" placeholder="比如：Wuxi"></div>
</div>

<!-- ========== 日期设置 ========== -->
<div class="section">
<h2>📅 日期设置</h2>
<div class="frow">
  <div class="fg"><label>开始日期</label><input type="date" id="startDate"></div>
  <div class="fg"><label>结束日期</label><input type="date" id="endDate"></div>
</div>
<div class="frow">
  <div class="fg"><label>重要考试/目标日</label><input type="date" id="examDate"></div>
  <div class="fg"><label>报名截止日（可选）</label><input type="date" id="regDate"></div>
</div>
<div class="tip">💡 日期都可以以后在App设置里修改，不用纠结，先填大概的就行</div>
</div>

<!-- ========== 主题色 ========== -->
<div class="section">
<h2>🎨 主题色</h2>
<p style="font-size:13px;color:var(--muted);margin-bottom:8px">选一个你最喜欢的颜色，整个App配色都会跟着变</p>
<div class="color-grid" id="colorGrid"></div>
<div class="color-name" id="colorName">当前：樱粉</div>
</div>

<!-- ========== 装饰图案 ========== -->
<div class="section">
<h2>🧸 装饰图案</h2>
<p style="font-size:13px;color:var(--muted);margin-bottom:8px">给背景加点可爱的小图案</p>
<div class="pattern-grid" id="patternGrid"></div>
</div>

<!-- ========== 每日任务模板 ========== -->
<div class="section">
<h2>📝 每日任务模板</h2>
<p style="font-size:13px;color:var(--muted);margin-bottom:10px">你每天固定要做的任务，添加后可一键生成每日计划</p>

<div style="font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;gap:6px">
  <span style="flex:2">任务名</span><span style="width:80px">开始</span><span style="width:80px">结束</span><span style="flex:1">备注</span><span style="width:28px"></span>
</div>
<div id="taskRows"></div>
<button class="add-row-btn" onclick="addTaskRow()">＋ 添加任务</button>

<div class="tip">💡 不知道怎么排？选一个"快速模板"一键填入：</div>
<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
  <button onclick="loadPreset('exam')" style="background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:6px 14px;color:var(--pri-l);cursor:pointer;font-size:12px">📖 考证冲刺</button>
  <button onclick="loadPreset('grad')" style="background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:6px 14px;color:var(--pri-l);cursor:pointer;font-size:12px">🎓 考研上岸</button>
  <button onclick="loadPreset('fitness')" style="background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:6px 14px;color:var(--pri-l);cursor:pointer;font-size:12px">💪 健身塑形</button>
  <button onclick="loadPreset('self')" style="background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:6px 14px;color:var(--pri-l);cursor:pointer;font-size:12px">🌟 自律生活</button>
  <button onclick="loadPreset('media')" style="background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:6px 14px;color:var(--pri-l);cursor:pointer;font-size:12px">🎬 自媒体日更</button>
  <button onclick="clearTasks()" style="background:var(--card2);border:1px solid var(--dng);border-radius:16px;padding:6px 14px;color:var(--dng);cursor:pointer;font-size:12px">🗑️ 清空重来</button>
</div>
</div>

<!-- ========== 每日习惯 ========== -->
<div class="section">
<h2>🎯 每日习惯</h2>
<p style="font-size:13px;color:var(--muted);margin-bottom:10px">你每天要打卡的习惯项</p>
<div id="habitRows"></div>
<button class="add-row-btn" onclick="addHabitRow()">＋ 添加习惯</button>
</div>

<!-- ========== 特殊要求 ========== -->
<div class="section">
<h2>💬 特殊要求（可选）</h2>
<div class="fg"><label>有没有上面没覆盖到的需求？</label><textarea id="specialReq" placeholder="比如：倒计时标签改成"毕业答辩"而不是"考试"&#10;比如：不要喝水打卡功能&#10;比如：习惯图标想要猫猫&#10;没有特殊要求就留空"></textarea></div>
</div>

<!-- ========== 生成 ========== -->
<button class="gen-btn" onclick="generate()">📋 生成需求汇总</button>

<div class="result-area" id="resultArea">
  <div class="section" style="margin-top:20px">
    <h2>✅ 你的需求汇总</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px">👇 复制以下内容发给卖家即可</p>
    <div class="result-box" id="resultBox"></div>
    <button class="copy-btn" onclick="copyResult()">📋 一键复制</button>
    <div class="copied-msg" id="copiedMsg">✅ 已复制到剪贴板！发给卖家吧～</div>
  </div>
</div>

<script>
// ============ PRESET DATA ============
const PRESET_COLORS = [
  {name:'樱粉',color:'#FF6B9D'},{name:'薰衣草',color:'#A78BFA'},{name:'天空蓝',color:'#38BDF8'},
  {name:'薄荷绿',color:'#34D399'},{name:'日落橙',color:'#FB923C'},{name:'柠檬黄',color:'#FBBF24'},
  {name:'玫瑰红',color:'#F43F5E'},{name:'深空灰',color:'#94A3B8'},
];
const PATTERNS = [
  {id:'none',name:'纯色',icon:'⬜'},{id:'dots',name:'圆点',icon:'⚪'},
  {id:'stars',name:'星星',icon:'⭐'},{id:'hearts',name:'爱心',icon:'💗'},
  {id:'bubbles',name:'气泡',icon:'🫧'},{id:'waves',name:'波浪',icon:'🌊'},
  {id:'clouds',name:'云朵',icon:'☁️'},{id:'flower',name:'花瓣',icon:'🌸'},
];
const TASK_PRESETS = {
  exam: [
    {name:'🌅 早起晨读',start:'06:30',end:'07:00',note:'背诵核心知识点'},
    {name:'📖 刷题训练',start:'08:00',end:'10:00',note:'重点章节刷题'},
    {name:'☕ 休息',start:'10:00',end:'10:15',note:'起来走走喝口水'},
    {name:'📝 错题复盘',start:'10:15',end:'12:00',note:'整理错题本'},
    {name:'🍱 午饭+午休',start:'12:00',end:'13:30',note:''},
    {name:'📚 知识点梳理',start:'14:00',end:'16:00',note:'三色笔记/思维导图'},
    {name:'🎯 模拟考试',start:'16:00',end:'18:00',note:'限时模拟'},
    {name:'📝 当日复盘',start:'22:00',end:'22:30',note:'今日总结+明日计划'},
  ],
  grad: [
    {name:'🌅 英语晨读',start:'06:30',end:'07:30',note:'背单词+阅读'},
    {name:'📖 专业课',start:'08:00',end:'11:30',note:'核心教材'},
    {name:'🍱 午饭+午休',start:'12:00',end:'13:30',note:''},
    {name:'🇨🇳 政治',start:'14:00',end:'16:00',note:'马原/毛概/史纲'},
    {name:'📝 英语真题',start:'16:30',end:'18:00',note:'阅读理解+翻译'},
    {name:'📚 专业课刷题',start:'19:30',end:'21:30',note:''},
    {name:'📝 复盘总结',start:'22:00',end:'22:30',note:'今日总结+明日计划'},
  ],
  fitness: [
    {name:'🌅 晨起拉伸',start:'06:30',end:'07:00',note:'全身拉伸15分钟'},
    {name:'🥗 早餐',start:'07:30',end:'08:00',note:'高蛋白低碳水'},
    {name:'🏋️ 力量训练',start:'10:00',end:'11:30',note:'今日训练部位'},
    {name:'🥗 午餐',start:'12:00',end:'12:30',note:'蛋白质+蔬菜为主'},
    {name:'🏃 有氧运动',start:'16:00',end:'17:00',note:'跑步/跳绳/游泳'},
    {name:'🧘 瑜伽拉伸',start:'20:00',end:'20:30',note:'放松恢复'},
    {name:'📝 训练记录',start:'21:00',end:'21:15',note:'记录重量/组数/感受'},
  ],
  self: [
    {name:'🌅 晨间仪式',start:'06:30',end:'07:00',note:'冥想+计划今天'},
    {name:'📖 阅读',start:'08:00',end:'09:00',note:'至少30分钟'},
    {name:'💻 深度工作',start:'09:30',end:'12:00',note:'最重要的事先做'},
    {name:'🍱 午饭',start:'12:00',end:'13:00',note:''},
    {name:'🎯 下午专注',start:'14:00',end:'17:00',note:'番茄钟交替'},
    {name:'📝 晚间复盘',start:'21:30',end:'22:00',note:'今天完成了什么'},
  ],
  media: [
    {name:'🌅 热点浏览',start:'07:00',end:'07:30',note:'刷热点找灵感'},
    {name:'✏️ 选题策划',start:'08:30',end:'09:30',note:'确定今日选题'},
    {name:'📝 写脚本',start:'09:30',end:'11:00',note:''},
    {name:'🎬 拍摄/制作',start:'14:00',end:'16:00',note:''},
    {name:'✂️ 剪辑修图',start:'16:00',end:'18:00',note:''},
    {name:'📤 发布+互动',start:'20:00',end:'21:00',note:'回复评论+互动'},
    {name:'📊 数据复盘',start:'21:30',end:'22:00',note:'分析数据+优化'},
  ],
};
const HABIT_PRESETS = {
  exam:[{name:'早起(6:30前)',icon:'🌅'},{name:'刷题100道',icon:'📖'},{name:'背知识点',icon:'🧠'},{name:'运动30分钟',icon:'🏃'},{name:'复盘总结',icon:'📝'}],
  grad:[{name:'早起(6:00前)',icon:'🌅'},{name:'背单词',icon:'📖'},{name:'刷真题',icon:'✏️'},{name:'运动30分钟',icon:'🏃'},{name:'复盘总结',icon:'📝'}],
  fitness:[{name:'早起',icon:'🌅'},{name:'喝水8杯',icon:'💧'},{name:'运动1小时',icon:'🏋️'},{name:'控制饮食',icon:'🥗'},{name:'早睡(23:00前)',icon:'😴'}],
  self:[{name:'早起',icon:'🌅'},{name:'运动30分钟',icon:'🏃'},{name:'阅读30分钟',icon:'📚'},{name:'喝水8杯',icon:'💧'},{name:'早睡',icon:'😴'}],
  media:[{name:'早起',icon:'🌅'},{name:'日更发布',icon:'📤'},{name:'互动30分钟',icon:'💬'},{name:'学习对标账号',icon:'👀'},{name:'复盘数据',icon:'📊'}],
};
const EMOJIS = ['🌅','📖','🧠','🏃','📝','💧','📚','🏋️','🥗','😴','✏️','🎯','💬','📊','📤','👀','💪','🧘','💻','🎨'];

let selectedColor = '#FF6B9D';
let selectedPattern = 'none';

// ============ INIT ============
function init() {
  renderColorGrid();
  renderPatternGrid();
  // Default: load exam preset
  loadPreset('exam');
  // Default dates
  const today = new Date();
  document.getElementById('startDate').value = fmtDate(today);
  const end = new Date(); end.setDate(end.getDate() + 79);
  document.getElementById('endDate').value = fmtDate(end);
  // City change
  document.getElementById('city').onchange = function(){
    document.getElementById('otherCityBox').style.display = this.value==='other'?'block':'none';
  };
}

function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// ============ COLOR GRID ============
function renderColorGrid(){
  const grid = document.getElementById('colorGrid');
  let h = PRESET_COLORS.map(c =>
    `<div class="color-swatch${selectedColor===c.color?' selected':''}" style="background:${c.color}" onclick="pickColor('${c.color}','${c.name}')" title="${c.name}"></div>`
  ).join('');
  h += `<div class="color-custom" title="自定义颜色"><span class="color-custom-label">🎨</span><input type="color" value="${selectedColor}" onchange="pickColor(this.value,'自定义')"></div>`;
  grid.innerHTML = h;
}
function pickColor(color, name){
  selectedColor = color;
  renderColorGrid();
  document.getElementById('colorName').textContent = '当前：' + name;
}

// ============ PATTERN GRID ============
function renderPatternGrid(){
  const grid = document.getElementById('patternGrid');
  grid.innerHTML = PATTERNS.map(p =>
    `<div class="pattern-card${selectedPattern===p.id?' selected':''}" onclick="pickPattern('${p.id}')"><span class="pt-icon">${p.icon}</span><span class="pt-name">${p.name}</span></div>`
  ).join('');
}
function pickPattern(id){selectedPattern=id;renderPatternGrid();}

// ============ TASK ROWS ============
let taskCount = 0;
function addTaskRow(name,start,end,note){
  taskCount++;
  const container = document.getElementById('taskRows');
  const div = document.createElement('div');
  div.className = 'task-row';
  div.id = 'task-'+taskCount;
  div.innerHTML = `<input class="t-name" placeholder="任务名" value="${name||''}"><input class="t-time" type="time" value="${start||'09:00'}"><input class="t-time" type="time" value="${end||'10:00'}"><input class="t-note" placeholder="备注" value="${note||''}"><button onclick="this.parentElement.remove()" title="删除">🗑️</button>`;
  container.appendChild(div);
}
function clearTasks(){document.getElementById('taskRows').innerHTML='';taskCount=0;}
function loadPreset(key){
  clearTasks();
  TASK_PRESETS[key].forEach(t=>addTaskRow(t.name,t.start,t.end,t.note));
  // Also load habits
  document.getElementById('habitRows').innerHTML='';
  HABIT_PRESETS[key].forEach(h=>addHabitRow(h.name,h.icon));
}

// ============ HABIT ROWS ============
let habitCount = 0;
function addHabitRow(name,icon){
  habitCount++;
  const container = document.getElementById('habitRows');
  const div = document.createElement('div');
  div.className = 'habit-row';
  div.id = 'habit-'+habitCount;
  let emojiOpts = EMOJIS.map(e=>`<option value="${e}"${e===icon?' selected':''}>${e}</option>`).join('');
  div.innerHTML = `<select>${emojiOpts}</select><input placeholder="习惯名称" value="${name||''}"><button onclick="this.parentElement.remove()" title="删除">🗑️</button>`;
  container.appendChild(div);
}

// ============ GENERATE ============
function generate(){
  const appName = document.getElementById('appName').value.trim()||'我的打卡';
  const city = document.getElementById('city').value==='other'?(document.getElementById('otherCity').value.trim()||'Beijing'):document.getElementById('city').value;
  const cityLabel = document.getElementById('city').selectedOptions[0].text;
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const examDate = document.getElementById('examDate').value;
  const regDate = document.getElementById('regDate').value;
  const colorName = document.getElementById('colorName').textContent.replace('当前：','');
  const patternName = PATTERNS.find(p=>p.id===selectedPattern)?.name||'纯色';
  const specialReq = document.getElementById('specialReq').value.trim();

  // Gather tasks
  const taskRows = document.querySelectorAll('#taskRows .task-row');
  let tasks = [];
  taskRows.forEach(row=>{
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    const start = inputs[1].value;
    const end = inputs[2].value;
    const note = inputs[3].value.trim();
    if(name) tasks.push({name,start,end,note});
  });

  // Gather habits
  const habitRows = document.querySelectorAll('#habitRows .habit-row');
  let habits = [];
  habitRows.forEach(row=>{
    const select = row.querySelector('select');
    const input = row.querySelector('input');
    const icon = select.value;
    const name = input.value.trim();
    if(name) habits.push({name,icon});
  });

  // Build summary text
  let text = `═══════════════════════\n`;
  text += `📋 打卡App定制需求单\n`;
  text += `═══════════════════════\n\n`;
  text += `【基础信息】\n`;
  text += `App名称：${appName}\n`;
  text += `城市：${cityLabel}（${city}）\n`;
  text += `主题色：${colorName}（${selectedColor}）\n`;
  text += `装饰图案：${patternName}\n\n`;
  text += `【日期设置】\n`;
  text += `开始日期：${startDate||'未填'}\n`;
  text += `结束日期：${endDate||'未填'}\n`;
  text += `考试/目标日：${examDate||'未填'}\n`;
  text += `报名截止日：${regDate||'未填'}\n\n`;
  text += `【每日任务模板】（${tasks.length}项）\n`;
  text += `─────────────────────\n`;
  if(tasks.length===0) text += '（未添加任务）\n';
  tasks.forEach((t,i)=>{
    text += `${i+1}. ${t.name}\n   时间：${t.start}-${t.end}${t.note?'\n   备注：'+t.note:''}\n`;
  });
  text += `\n【每日习惯】（${habits.length}项）\n`;
  text += `─────────────────────\n`;
  if(habits.length===0) text += '（未添加习惯）\n';
  habits.forEach((h,i)=>{
    text += `${i+1}. ${h.icon} ${h.name}\n`;
  });
  if(specialReq){
    text += `\n【特殊要求】\n`;
    text += `─────────────────────\n`;
    text += specialReq + '\n';
  }
  text += `\n═══════════════════════\n`;
  text += `以上信息确认无误，请制作！\n`;
  text += `═══════════════════════`;

  document.getElementById('resultBox').textContent = text;
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
}

function copyResult(){
  const text = document.getElementById('resultBox').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById('copiedMsg').classList.add('show');
    setTimeout(()=>document.getElementById('copiedMsg').classList.remove('show'),3000);
  }).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copiedMsg').classList.add('show');
    setTimeout(()=>document.getElementById('copiedMsg').classList.remove('show'),3000);
  });
}

// Init
init();
</script>
